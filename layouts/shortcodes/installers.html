<div class="plugin-installers-wrapper py-2 my-4">
    <div id="installer-table-{{ .Get "plugin" | urlize }}">
        <p><em>Detecting operating system to display installers...</em></p>
    </div>
    
    <button id="toggle-btn-{{ .Get "plugin" | urlize }}" class="btn btn-outline-primary mt-3 mb-2">
        Show all operating systems
    </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const repo = "{{ .Get "repo" }}";
    const plugin = "{{ .Get "plugin" }}";
    const version = "{{ .Get "version" }}";
    
    const containerId = "{{ .Get "plugin" | urlize }}";
    const container = document.getElementById(`installer-table-${containerId}`);
    const toggleBtn = document.getElementById(`toggle-btn-${containerId}`);

    const ua = navigator.userAgent;
    let detectedOS = "Windows";
    let showingAll = false;

    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
        showingAll = true;
        if (/iPhone|iPad|iPod|Mac/i.test(ua)) {
            detectedOS = "macOS";
        }
    } else {
        if (ua.indexOf("Win") !== -1) {
            detectedOS = "Windows";
        } else if (ua.indexOf("Mac") !== -1) {
            detectedOS = "macOS";
        } else if (ua.indexOf("Linux") !== -1) {
            detectedOS = "Linux";
        }
    }

    // 2. Inserted your exact OS Data
    const osData = {
        "macOS": [
            { chip: "x86-64<br><small>Intel Chip</small>", arch: "x86-64" },
            { chip: "ARM64<br><small>Apple M Chip</small>", arch: "arm64" }
        ],
        "Windows": [
            { chip: "x86-64<br><small>Intel / AMD (Legacy) Chip</small>", arch: "x86-64" },
            { chip: "x86-64 AVX2<br><small>Intel Core 5th Gen+ / AMD Ryzen+</small>", arch: "x86-64-AVX2" },
            { chip: "ARM64<br><small>Qualcomm Chip</small>", arch: "arm64" }
        ],
        "Linux": [
            { chip: "x86-64<br><small>Intel / AMD (Legacy) Chip</small>", arch: "x86-64" },
            { chip: "x86-64 AVX2<br><small>Intel Core 5th Gen+ / AMD Ryzen+</small>", arch: "x86-64-AVX2" },
            { chip: "ARM64", arch: "arm64" }
        ]
    };

    // 3. New mapping to fix the "undefined" file extension issue
    const extensions = {
        "macOS": "dmg",
        "Windows": "msi",
        "Linux": "zip"
    };

    const baseUrl = `https://github.com/${repo}/releases/download/${version}/`;

    // 4. Function to build and render the table
    function renderTable() {
        // Added standard Bootstrap table classes used by Docsy
        let tableHTML = `<table class="table table-striped table-bordered">
            <thead>
                <tr>`;
        
        if (showingAll) tableHTML += `<th>OS</th>`;
        
        tableHTML += `<th>Chip Architecture</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody>`;

        const osList = showingAll ? Object.keys(osData) : [detectedOS];

        osList.forEach(os => {
            // Retrieve the correct extension for the current OS in the loop
            const ext = extensions[os]; 
            
            osData[os].forEach((item, index) => {
                const fileName = `${plugin}-${version}-${os}-${item.arch}.${ext}`;
                const downloadUrl = `${baseUrl}${fileName}`;
                
                tableHTML += `<tr>`;
                
                if (showingAll && index === 0) {
                    // Added 'align-middle' so the OS name stays centered next to the rows
                    tableHTML += `<td rowspan="${osData[os].length}" class="align-middle"><strong>${os}</strong></td>`;
                }
                
                tableHTML += `<td class="align-middle">${item.chip}</td>
                    <td class="align-middle"><strong><a href="${downloadUrl}">${fileName}</a></strong></td>
                </tr>`;
            });
        });

        tableHTML += `</tbody></table>`;
        container.innerHTML = tableHTML;
        
        toggleBtn.innerText = showingAll ? "Hide other operating systems" : "Show all operating systems";
    }

    toggleBtn.addEventListener("click", function() {
        showingAll = !showingAll; 
        renderTable();            
    });

    renderTable();
});
</script>
